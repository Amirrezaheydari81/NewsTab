<!doctype html>
<html lang="fa" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>تب جدید</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg"></div>

    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="logo.png" alt="نیوز تب" class="brand-logo" />
          <div class="brand-text">
            <span class="brandname">نیوز تب</span>
            <span class="creator">
              <a
                href="https://github.com/Amirrezaheydari81/"
                target="_blank"
                rel="noopener noreferrer"
                >امیررضا حیدری</a
              >
            </span>
          </div>
        </div>
        <div class="clock-wrap">
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="date">--</div>
        </div>
        <div class="actions">
          <button
            class="icon-btn text-btn"
            id="translateBtn"
            title="ترجمه فارسی"
          >
            <span class="btn-label">FA</span>
            <span class="tooltip">ترجمه فارسی</span>
          </button>
          <button class="icon-btn" id="refreshBtn" title="به‌روزرسانی دستی">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M21 2v6h-6" />
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
              <path d="M3 22v-6h6" />
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
            </svg>
            <span class="tooltip">به‌روزرسانی</span>
          </button>
          <button
            class="icon-btn low-power-btn"
            id="lowPowerBtn"
            title="حالت کم مصرف"
          >
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="7" width="16" height="10" rx="2" ry="2" />
              <line x1="22" y1="11" x2="22" y2="13" />
              <line x1="6" y1="10" x2="6" y2="14" />
              <line x1="10" y1="10" x2="10" y2="14" />
            </svg>
            <span class="tooltip">حالت کم مصرف</span>
          </button>
          <button class="icon-btn sort-btn" id="sortBtn" title="مرتب‌سازی">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18" />
              <path d="M7 12h10" />
              <path d="M11 18h2" />
            </svg>
            <span class="tooltip">مرتب‌سازی</span>
          </button>
          <button class="icon-btn" id="settingsBtn" title="مدیریت فیدها">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82V9a1.65 1.65 0 0 0 1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0 1.51 1z"
              />
            </svg>
            <span class="tooltip">تنظیمات</span>
          </button>
        </div>
      </header>

      <div class="toolbar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="...جستجو در تیترها"
        />
        <span class="last-updated" id="lastUpdated"></span>
      </div>

      <main class="feeds-grid" id="feedsGrid">
        <!-- feed cards / groups injected by JS -->
      </main>
    </div>

    <!-- Settings overlay -->
    <div class="overlay" id="overlay">
      <div class="panel">
        <div class="panel-head">
          <h2>مدیریت فیدها</h2>
          <button class="icon-btn" id="closeSettings">✕</button>
        </div>

        <div class="feed-list" id="feedList"></div>

        <form class="add-feed" id="addFeedForm">
          <input
            type="text"
            id="feedName"
            placeholder="اسم فید (مثلاً تک‌کرانچ)"
            required
          />
          <input
            type="url"
            id="feedUrl"
            placeholder="https://example.com/feed"
            required
          />
          <button type="submit">افزودن فید</button>
        </form>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
