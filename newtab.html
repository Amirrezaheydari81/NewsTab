<!doctype html>
<html lang="fa" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>نیوز تب | NewsTab</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg"></div>

    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="logo.png" alt="نیوز تب" class="brand-logo" />
          <div class="brand-text">
            <div class="brand-row">
              <span class="badge">1.1.0.0</span>
              <span class="brandname">نیوز تب</span>
            </div>
            <span class="creator">
              <a
                href="https://github.com/Amirrezaheydari81/"
                target="_blank"
                rel="noopener noreferrer"
                >امیررضا حیدری</a
              >
            </span>
          </div>
        </div>
        <div class="clock-wrap">
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="date">--</div>
        </div>
        <div class="actions">
          <button class="icon-btn" id="menuBtn" data-tooltip="منو">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <button
            class="icon-btn emergency-btn"
            id="emergencyBtn"
            data-tooltip="پاکسازی کش اضطراری"
          >
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
          <div class="menu-vertical" id="menuVertical">
            <button
              class="menu-item active"
              id="translateBtn"
              data-action="translate"
              data-tooltip="ترجمه فارسی"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z" />
                <path d="M2 12h20" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10" />
              </svg>
            </button>
            <button
              class="menu-item"
              id="refreshBtn"
              data-action="refresh"
              data-tooltip="به‌روزرسانی"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 2v6h-6" />
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
                <path d="M3 22v-6h6" />
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
              </svg>
            </button>
            <button
              class="menu-item"
              id="lowPowerBtn"
              data-action="lowpower"
              data-tooltip="حالت کم مصرف"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="7" width="16" height="10" rx="2" ry="2" />
                <line x1="22" y1="11" x2="22" y2="13" />
                <line x1="6" y1="10" x2="6" y2="14" />
                <line x1="10" y1="10" x2="10" y2="14" />
              </svg>
            </button>
            <button
              class="menu-item"
              id="sortBtn"
              data-action="sort"
              data-tooltip="مرتب‌سازی"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 6h18" />
                <path d="M7 12h10" />
                <path d="M11 18h2" />
              </svg>
            </button>
            <button
              class="menu-item"
              id="quotesBtn"
              data-action="quotes"
              data-tooltip="نقل قول"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 1 1 2v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"
                />
                <path
                  d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"
                />
              </svg>
            </button>
            <button
              class="menu-item"
              id="tickersBtn"
              data-action="tickers"
              data-tooltip="قیمت‌ها"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2v20M2 12h20" />
              </svg>
            </button>
            <button
              class="menu-item"
              id="settingsBtn"
              data-action="settings"
              data-tooltip="تنظیمات"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82V9a1.65 1.65 0 0 0 1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0 1.51 1z"
                />
              </svg>
            </button>
            <button
              class="menu-item menu-item--danger"
              id="clearCacheBtn"
              data-action="clearCache"
              data-tooltip="پاکسازی کش"
            >
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 6h18" />
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <div class="ticker-section" id="tickerSection">
        <tgju
          type="ticker-single"
          items="137121"
          columns="dot"
          token="webservice"
          styles='{
            "background": "#1c3944",
            "hover": "#2a4f5f",
            "border": "#ffffff24",
            "separator": "#ffffff18",
            "data-tooltip": "#eef4f48c",
            "dot": "#7fa8c9",
            "price": "#eef4f4",
            "low": "#e08a8a",
            "high": "#7fa8c9",
            "copyright": "#eef4f452",
            "copyright_fix": "#1c3944",
            "copyright_fix_text": "#eef4f48c"
          }'
        ></tgju>
        <tgju
          type="ticker-single"
          items="137203"
          columns="dot"
          token="webservice"
          styles='{
            "background": "#1c3944",
            "hover": "#2a4f5f",
            "border": "#ffffff24",
            "separator": "#ffffff18",
            "data-tooltip": "#eef4f48c",
            "dot": "#7fa8c9",
            "price": "#eef4f4",
            "low": "#e08a8a",
            "high": "#7fa8c9",
            "copyright": "#eef4f452",
            "copyright_fix": "#1c3944",
            "copyright_fix_text": "#eef4f48c"
          }'
        ></tgju>
      </div>

      <div class="quote-section" id="quoteSection">
        <div class="quote-card" id="quoteCard">
          <div class="quote-text" id="quoteText">
            در حال بارگذاری نقل قول...
          </div>
        </div>
      </div>
      <div class="toolbar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="...جستجو در تیترها"
        />
        <span class="last-updated" id="lastUpdated"></span>
      </div>

      <main class="feeds-grid" id="feedsGrid">
        <!-- feed cards / groups injected by JS -->
      </main>
    </div>

    <!-- Settings overlay -->
    <div class="overlay" id="overlay">
      <div class="panel">
        <div class="panel-head">
          <h2>مدیریت فیدها</h2>
          <button class="icon-btn" id="closeSettings">✕</button>
        </div>

        <div class="feed-list" id="feedList"></div>

        <form class="add-feed" id="addFeedForm">
          <input
            type="text"
            id="feedName"
            placeholder="اسم فید (مثلاً تک‌کرانچ)"
            required
          />
          <input
            type="url"
            id="feedUrl"
            placeholder="https://example.com/feed"
            required
          />
          <button type="submit">افزودن فید</button>
        </form>
      </div>
    </div>
    <script src="tgju-v2.js" defer></script>
    <script src="app.js"></script>
    <script src="quotes.js"></script>
  </body>
</html>
